<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inbox — Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        min-width: 320px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
      }
      label {
        display: block;
        margin-bottom: 1rem;
      }
      label span {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        color: #555;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }
      button {
        width: 100%;
        padding: 0.6rem;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      .error {
        color: #dc2626;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📥 Inbox</h1>
      {% if let Some(err) = error %}<p class="error">{{ err }}</p>{% endif %}
      <form method="post" action="login">
        <label
          ><span>Username</span
          ><input name="username" autocomplete="username" required
        /></label>
        <label
          ><span>Password</span
          ><input
            name="password"
            type="password"
            autocomplete="current-password"
            required
        /></label>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
